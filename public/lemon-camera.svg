<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 90">
  <!-- Lemon body shadow -->
  <ellipse cx="55" cy="54" rx="46" ry="28" fill="#C89000" opacity="0.25"/>

  <!-- Main lemon body -->
  <path d="M 8 46 C 8 22 26 14 55 14 C 84 14 102 22 102 46 C 102 70 84 78 55 78 C 26 78 8 70 8 46 Z"
        fill="#F7C840"/>

  <!-- Top highlight on lemon -->
  <ellipse cx="45" cy="30" rx="28" ry="10" fill="white" opacity="0.18"/>

  <!-- Right bump (camera detail) -->
  <ellipse cx="101" cy="46" rx="8" ry="10" fill="#E0A800"/>
  <ellipse cx="101" cy="44" rx="5" ry="6" fill="#F0BB20" opacity="0.5"/>

  <!-- Lens outer ring (gold) -->
  <circle cx="50" cy="48" r="26" fill="#D09800"/>

  <!-- Lens cream ring -->
  <circle cx="50" cy="48" r="22" fill="#F5E888"/>

  <!-- Lens dark glass -->
  <circle cx="50" cy="48" r="17" fill="#1C1400"/>

  <!-- Lens dark inner -->
  <circle cx="50" cy="48" r="11" fill="#0D0800"/>

  <!-- Lens highlight 1 -->
  <circle cx="43" cy="41" r="5" fill="white" opacity="0.45"/>
  <!-- Lens highlight 2 (small) -->
  <circle cx="55" cy="54" r="2" fill="white" opacity="0.18"/>

  <!-- Leaf -->
  <path d="M 47 15 C 42 3 58 1 60 9 C 54 15 47 15 47 15 Z" fill="#5A8830"/>
  <path d="M 59 9 C 53 12 48 14 47 15" stroke="#3F6018" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Plus button top-right -->
  <circle cx="79" cy="24" r="10" fill="#D09800"/>
  <circle cx="79" cy="24" r="8" fill="#E8B200"/>
  <path d="M 74 24 H 84 M 79 19 V 29" stroke="#F7C840" stroke-width="2.8" stroke-linecap="round"/>
</svg>
